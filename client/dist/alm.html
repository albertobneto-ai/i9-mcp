var API_BASE = '/api/alm';
var AUTH_TOKEN = null;

async function apiLogin() {
  try {
    var res = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:'admin@everi9.com',password:'admin2026'})
    });
    var data = await res.json();
    AUTH_TOKEN = data.token;
    return true;
  } catch(e) { console.error('Login failed',e); return false; }
}

function apiHeaders() {
  var h = {'Content-Type':'application/json'};
  if (AUTH_TOKEN) h['Authorization'] = 'Bearer ' + AUTH_TOKEN;
  return h;
}

async function apiGet(path) {
  var res = await fetch(API_BASE + path, {headers:apiHeaders()});
  return res.json();
}

async function apiPost(path, body) {
  var res = await fetch(API_BASE + path, {method:'POST', headers:apiHeaders(), body:JSON.stringify(body)});
  return res.json();
}

async function apiDelete(path) {
  var res = await fetch(API_BASE + path, {method:'DELETE', headers:apiHeaders()});
  return res.json();
}

async function apiPut(path, body) {
  var res = await fetch(API_BASE + path, {method:'PUT', headers:apiHeaders(), body:JSON.stringify(body)});
  return res.json();
}
